- name: Create validator directories
  become: yes
  file:
    path: "{{ item }}"
    owner: "{{ solana_user }}"
    group: "{{ solana_user }}"
    state: directory
    mode: '0755'
  with_items:
    - "{{ ledger_path }}"
    - "{{ accounts_path }}"
    - "{{ snapshots_path }}"
    - "{{ validator_log_path }}"
    - "{{ accounts_hash_cache_path }}"
    - "{{ accounts_index_path }}"   
  tags:
    - config.solana_user
    - validator.service.solana

