---
- name: Ensure group solana exists
  ansible.builtin.group:
    name: "{{ solana_user }}"
    state: present

- name: Create user solana
  user:
    name: "{{ solana_user }}"
    state: present
    create_home: yes
    shell: /bin/bash
    skeleton: /etc/skel
    force: yes
    groups:
      - "{{ solana_user }}"
      - syslog
  tags:
    - config.solana_user
    - validator.service.solana

- name: Create secrets dir
  become: yes
  become_user: "{{ solana_user }}"
  file:
    path: "{{ secrets_path }}"
    state: directory
    mode: '0700'
  tags:
    - config.solana_user
    - validator.service.solana

